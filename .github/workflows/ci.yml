name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff linting
        run: ruff check .
        continue-on-error: false

      - name: Run mypy type checking
        run: mypy . --ignore-missing-imports
        continue-on-error: false

      - name: Run pytest
        run: python -m pytest tests/ -v
        continue-on-error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit (medium+ severity)
        run: bandit -r . -ll -s B108 --exclude .venv,venv,env,.git,node_modules,__pycache__,build,dist,.tox,.eggs,.pytest_cache
        # B108 findings in tests/ are deferred to Plan 53 — skip B108 test for now
        # Remove the -s B108 when Plan 53 fixes B108
        continue-on-error: false

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Install project deps
        run: pip install -r requirements.txt
      - name: Run pip-audit
        run: pip-audit --strict
        # Will fail until diskcache CVE is fixed and pip is upgraded in CI image
        continue-on-error: true  # TODO: change to false after diskcache CVE is fixed upstream

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install vulture
        run: pip install vulture
      - name: Run vulture (min-confidence 80, whitelist existing findings)
        run: |
          python -c "
          import subprocess, sys
          result = subprocess.run(['vulture', '.', '--min-confidence', '80', '--exclude', '.venv,venv,env,.git,node_modules,__pycache__,build,dist,.tox,.eggs,.pytest_cache,.mypy_cache,.ruff_cache,htmlcov'], capture_output=True, text=True)
          findings = [l for l in result.stdout.splitlines() if 'confidence' in l]
          with open('vulture-whitelist.txt', encoding='utf-8') as f:
              whitelist = set(l.strip() for l in f if l.strip())
          new_findings = [f for f in findings if f not in whitelist]
          if new_findings:
              print('NEW vulture findings (not in whitelist):')
              for f in new_findings:
                  print(f'  {f}')
              sys.exit(1)
          print(f'All {len(findings)} findings are whitelisted.')
          "
        continue-on-error: false

  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Run detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline
        continue-on-error: false

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install pytest-cov
        run: pip install pytest-cov
      - name: Run pytest with coverage
        run: python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing
        continue-on-error: false
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
