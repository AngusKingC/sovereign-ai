name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff linting
        run: ruff check .
        continue-on-error: false

      - name: Run mypy type checking
        run: mypy core/ adapters/ workers/ system/ cli/ memory/ --ignore-missing-imports
        continue-on-error: false

      - name: Run pytest
        run: python -m pytest tests/ -v
        continue-on-error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit (medium+ severity)
        run: bandit -r . -ll -s B108 --exclude .venv,venv,env,.git,node_modules,__pycache__,build,dist,.tox,.eggs,.pytest_cache
        # B108 findings in tests/ are deferred to Plan 53 — skip B108 test for now
        # Remove the -s B108 when Plan 53 fixes B108
        continue-on-error: false

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Install project deps
        run: pip install -r requirements.txt
      - name: Run pip-audit
        run: pip-audit --strict
        # Will fail until diskcache CVE is fixed and pip is upgraded in CI image
        continue-on-error: true  # TODO: change to false after Plan 56 (deps) lands

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install vulture
        run: pip install vulture
      - name: Run vulture (min-confidence 80)
        run: vulture . --min-confidence 80
        # Will fail — 47 findings exist. TODO: change to fail-build after Plan 57 (dead code cleanup) lands
        continue-on-error: true
